<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}My Website{% endblock %}</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #f8f9fa;
    }

    /* ── Navbar ── */
    .navbar-brand {
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
    }
    .navbar .nav-link {
      font-weight: 500;
      transition: color 0.2s;
    }
    .navbar .nav-link.active {
      color: #0d6efd !important;
    }

    /* ── Main content area ── */
    main {
      flex: 1;
    }

    /* ── Footer ── */
    footer {
      background: #212529;
      color: #adb5bd;
      font-size: 0.875rem;
    }
    footer a {
      color: #6ea8fe;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

  <!-- ════════════════════════ HEADER / NAVBAR ════════════════════════ -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="{% url 'home' %}">
        <i class="bi bi-layers-half me-2"></i>MyWebsite
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
        aria-controls="mainNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a
              class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
              href="{% url 'home' %}"
            >Home</a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link {% if request.resolver_match.url_name == 'page2' %}active{% endif %}"
              href="{% url 'page2' %}"
            >Page 2</a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link {% if request.resolver_match.url_name == 'page3' %}active{% endif %}"
              href="{% url 'page3' %}"
            >Page 3</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- Page content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ════════════════════════ FOOTER ════════════════════════════════ -->
  <footer class="py-4 mt-5">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
      <span>
        &copy; 2026 <strong class="text-white">MyWebsite</strong>. All rights reserved.
      </span>
      <nav class="d-flex gap-3">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'page2' %}">Page 2</a>
        <a href="{% url 'page3' %}">Page 3</a>
      </nav>
    </div>
  </footer>
  <!-- ════════════════════════════════════════════════════════════════ -->

  <!-- Bootstrap 5 JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
